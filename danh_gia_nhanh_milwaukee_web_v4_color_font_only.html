<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Đánh giá nhanh</title>
  <style>
    :root {
      --red:#d71920;
      --red-dark:#b70f18;
      --green:#148b43;
      --gray:#6d6d6d;
      --text:#111;
      --border:#c9c9c9;
      --shadow:0 7px 18px rgba(0,0,0,.10);
    }
    * { box-sizing:border-box; }
    html,body { margin:0; min-height:100%; }
    body {
      font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
      color:var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      background:
        radial-gradient(circle at 94% 13%, rgba(0,0,0,.12) 0 1.2px, transparent 1.5px) 0 0/11px 11px,
        linear-gradient(135deg,#f7f7f7 0%,#fff 45%,#f0f0f0 100%);
      overflow:auto;
    }
    body::before {
      content:""; position:fixed; inset:0; z-index:-2; pointer-events:none;
      background:
        linear-gradient(136deg, rgba(221,221,221,.8) 0 4%, transparent 4.2% 100%),
        linear-gradient(130deg, transparent 0 10%, rgba(205,205,205,.65) 10.1% 10.7%, transparent 10.9% 100%);
    }
    body::after {
      content:""; position:fixed; left:0; right:0; bottom:0; height:34px; z-index:-1; pointer-events:none;
      background:
        linear-gradient(42deg, transparent 0 36%, var(--red) 36.4% 59%, transparent 59.4%),
        linear-gradient(0deg,#252525 0 24%,transparent 24%),
        linear-gradient(0deg,transparent 0 62%,var(--red) 62% 100%);
    }
    .top-stripes {
      position:fixed; top:0; right:26%; width:112px; height:28px; z-index:-1;
      background:linear-gradient(132deg, transparent 0 39%, var(--red) 39% 49%, transparent 49% 58%, var(--red) 58% 68%, transparent 68% 100%);
    }
    .page {
      min-height:100svh;
      width:min(100%, 1600px);
      margin:0 auto;
      padding:clamp(14px,2.1vw,28px) clamp(18px,2.8vw,44px) 42px;
      display:grid;
      grid-template-columns:minmax(380px,42%) minmax(540px,58%);
      gap:clamp(36px,4.2vw,70px);
      align-items:center;
    }
    .brand-card {
      height:calc(100svh - 86px);
      min-height:520px;
      max-height:720px;
      border-radius:13px;
      border:2px solid rgba(255,255,255,.94);
      background:#e11f3a;
      box-shadow:0 9px 22px rgba(0,0,0,.24);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }
    .brand-card img {
      width:65%; max-width:440px; height:auto; display:block;
      filter:drop-shadow(0 2px 2px rgba(0,0,0,.05));
    }
    .form-panel { width:100%; max-width:840px; }
    h1 {
      margin:0 0 clamp(24px,4vh,36px);
      color:var(--red);
      font-size:clamp(48px,4.7vw,76px);
      line-height:.96;
      letter-spacing:.4px;
      font-weight:900;
      white-space:nowrap;
      text-shadow:none;
    }
    .input-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
    .field {
      height:58px;
      border:1.5px solid var(--border);
      border-radius:10px;
      background:rgba(255,255,255,.78);
      box-shadow:0 4px 10px rgba(0,0,0,.07), inset 0 1px 0 rgba(255,255,255,.95);
      display:flex; align-items:center; overflow:hidden;
    }
    .field svg { width:31px; height:31px; margin-left:20px; flex:0 0 auto; color:var(--red); }
    .field input {
      width:100%; height:100%; border:0; outline:0; background:transparent;
      font-size:18px; padding:0 18px; color:#222; font-weight:500;
    }
    .field input::placeholder, textarea::placeholder { color:#7a7a7a; opacity:1; }
    .q-title { margin:12px 0 10px; font-size:20px; font-weight:800; line-height:1.25; }
    .choice-grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-bottom:12px; }
    .choice-grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:20px; margin-bottom:12px; }
    .choice {
      height:120px;
      border:1.5px solid var(--border);
      border-radius:11px;
      background:rgba(255,255,255,.70);
      box-shadow:0 4px 11px rgba(0,0,0,.07), inset 0 1px 0 rgba(255,255,255,.95);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:9px;
      cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent;
      transition:transform .14s ease, border-color .14s ease, box-shadow .14s ease, background .14s ease;
    }
    .choice:hover { transform:translateY(-1px); background:#fff; box-shadow:0 6px 14px rgba(0,0,0,.10); }
    .choice.selected { border-color:var(--red); background:#fff; box-shadow:0 0 0 3px rgba(215,25,32,.14), 0 6px 14px rgba(0,0,0,.10); }
    .choice:focus-visible, .btn:focus-visible { outline:3px solid rgba(215,25,32,.35); outline-offset:2px; }
    .choice span { font-size:18px; line-height:1.2; text-align:center; font-weight:500; }
    .face,.mark { width:60px; height:60px; display:block; flex:0 0 auto; }
    .sad-wrap { position:relative; display:inline-block; }
    .sad-wrap .question { position:absolute; right:-17px; top:-14px; color:var(--red); font-size:34px; font-weight:1000; line-height:1; }
    .comment-box {
      width:100%; min-height:100px; max-height:150px;
      border:1.5px solid var(--border); border-radius:11px;
      background:rgba(255,255,255,.75);
      box-shadow:0 4px 11px rgba(0,0,0,.07), inset 0 1px 0 rgba(255,255,255,.95);
      font-family:Arial, Helvetica, sans-serif; font-size:20px;
      padding:17px 20px; outline:none; resize:vertical; color:#222;
    }
    .actions { margin-top:13px; display:flex; justify-content:flex-end; }
    .btn {
      border:0; min-height:48px; padding:0 34px; border-radius:10px;
      background:linear-gradient(135deg,#e31b27,#bd1019); color:white;
      box-shadow:0 8px 17px rgba(215,25,32,.25);
      font-size:16px; font-weight:800; letter-spacing:.3px; cursor:pointer;
    }
    .btn:active { transform:scale(.985); }
    .btn[disabled] { opacity:.62; cursor:not-allowed; }
    .toast {
      position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(22px);
      background:#111; color:#fff; padding:12px 16px; border-radius:11px;
      box-shadow:0 12px 24px rgba(0,0,0,.25); opacity:0; pointer-events:none;
      transition:.22s ease; z-index:10; font-weight:700; max-width:calc(100vw - 30px); text-align:center;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
    @media (max-width:1280px) {
      .page { grid-template-columns:minmax(340px,40%) minmax(520px,60%); gap:36px; padding-left:26px; padding-right:26px; }
      .brand-card { min-height:470px; }
      .brand-card img { width:66%; }
      h1 { font-size:clamp(44px,4.8vw,66px); margin-bottom:24px; }
      .choice { height:112px; }
      .face,.mark { width:56px; height:56px; }
      .q-title { font-size:19px; }
      .choice span { font-size:17px; }
      .comment-box { min-height:92px; }
    }
    @media (max-width:980px) {
      .page { grid-template-columns:1fr; gap:18px; padding:18px 16px 46px; }
      .brand-card { height:28svh; min-height:210px; max-height:300px; order:0; }
      .brand-card img { width:min(54%,280px); }
      .form-panel { max-width:100%; }
      h1 { text-align:center; font-size:clamp(38px,9vw,62px); margin:4px 0 20px; white-space:normal; }
    }
    @media (max-width:640px) {
      .top-stripes { right:22px; }
      .input-row,.choice-grid-3,.choice-grid-2 { grid-template-columns:1fr; gap:10px; }
      .field { height:58px; }
      .field input { font-size:17px; }
      .choice { height:86px; flex-direction:row; justify-content:flex-start; padding:0 22px; gap:16px; }
      .choice span { font-size:17px; text-align:left; }
      .face,.mark { width:52px; height:52px; }
      .sad-wrap .question { font-size:28px; right:-15px; top:-12px; }
      .comment-box { min-height:118px; font-size:17px; }
      .actions { justify-content:stretch; }
      .btn { width:100%; min-height:50px; }
    }
  </style>
</head>

            <span class="sad-wrap"><svg class="face" viewBox="0 0 100 100" aria-hidden="true"><defs><radialGradient id="gRed" cx="32%" cy="24%" r="78%"><stop offset="0" stop-color="#f11828"/><stop offset="1" stop-color="#c90814"/></radialGradient></defs><circle cx="50" cy="50" r="44" fill="url(#gRed)"/><path d="M31 38c4 0 7 3 7 7" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round"/><path d="M62 45c0-4 3-7 7-7" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round"/><path d="M29 70c10-14 32-14 42 0" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round"/></svg><b class="question">?</b></span>
            <span>Không hiểu</span>
          </button>
        </div>

        <div class="q-title">2. Bạn sẽ áp dụng vào Công Việc?</div>
        <div class="choice-grid-2" role="radiogroup" aria-label="Áp dụng vào công việc">
          <button type="button" class="choice" data-group="apply" data-value="Đồng ý" aria-pressed="false">
            <svg class="mark" viewBox="0 0 100 100" aria-hidden="true"><defs><radialGradient id="gCheck" cx="32%" cy="24%" r="78%"><stop offset="0" stop-color="#30cf6b"/><stop offset="1" stop-color="#0f7937"/></radialGradient></defs><circle cx="50" cy="50" r="44" fill="url(#gCheck)"/><path d="M28 51l15 16 30-36" fill="none" stroke="#fff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>Đồng ý</span>
          </button>
          <button type="button" class="choice" data-group="apply" data-value="Không đồng ý" aria-pressed="false">
            <svg class="mark" viewBox="0 0 100 100" aria-hidden="true"><defs><radialGradient id="gX" cx="32%" cy="24%" r="78%"><stop offset="0" stop-color="#f11828"/><stop offset="1" stop-color="#c90814"/></radialGradient></defs><circle cx="50" cy="50" r="44" fill="url(#gX)"/><path d="M34 34l32 32M66 34L34 66" fill="none" stroke="#fff" stroke-width="9" stroke-linecap="round"/></svg>
            <span>Không đồng ý</span>
          </button>
        </div>

        <label for="comment" class="q-title" style="display:block;">3. Bạn có ý kiến gì khác không?</label>
        <textarea id="comment" class="comment-box" name="comment" placeholder="Nhập ý kiến của bạn..."></textarea>
        <div class="actions"><button type="submit" class="btn" id="submitBtn">NỘP ĐÁNH GIÁ</button></div>
      </form>
    </section>
  </main>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    // Dán HTTP POST URL của Power Automate vào đây.
    // Ví dụ: const POWER_AUTOMATE_URL = "https://default8b8cc6cf0eaa4b6498e46d4672c449.30.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/65836127d9804583adc31e8d7e8da415/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=eleOBZITq0FMh3KcdrCzEuM9y_Jc053F0Aqod1Qn7PQ";
    const POWER_AUTOMATE_URL = "https://default8b8cc6cf0eaa4b6498e46d4672c449.30.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/65836127d9804583adc31e8d7e8da415/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=eleOBZITq0FMh3KcdrCzEuM9y_Jc053F0Aqod1Qn7PQ";

    const form = document.getElementById('feedbackForm');
    const submitBtn = document.getElementById('submitBtn');
    const toast = document.getElementById('toast');
    const state = { overall: '', apply: '' };

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove('show'), 3400);
    }

    document.addEventListener('click', function(event) {
      const btn = event.target.closest('.choice');
      if (!btn) return;
      const group = btn.dataset.group;
      document.querySelectorAll('.choice[data-group="' + group + '"]').forEach(function(item) {
        item.classList.remove('selected');
        item.setAttribute('aria-pressed', 'false');
      });
      btn.classList.add('selected');
      btn.setAttribute('aria-pressed', 'true');
      state[group] = btn.dataset.value;
    });

    function getDevice() {
      const w = window.innerWidth;
      if (w <= 640) return 'Mobile';
      if (w <= 980) return 'Tablet';
      return 'Desktop/Laptop';
    }

    function buildPayload() {
      return {
        SubmitTime: new Date().toISOString(),
        FullName: document.getElementById('fullName').value.trim(),
        EmployeeID: document.getElementById('employeeId').value.trim(),
        Overall: state.overall,
        ApplyToWork: state.apply,
        Comment: document.getElementById('comment').value.trim(),
        Source: 'QR Feedback - Đánh giá nhanh',
        Device: getDevice()
      };
    }

    function resetForm() {
      form.reset();
      state.overall = '';
      state.apply = '';
      document.querySelectorAll('.choice').forEach(function(btn) {
        btn.classList.remove('selected');
        btn.setAttribute('aria-pressed', 'false');
      });
    }

    form.addEventListener('submit', async function(event) {
      event.preventDefault();
      const payload = buildPayload();

      if (!payload.FullName) return showToast('Vui lòng nhập Họ và Tên.');
      if (!payload.EmployeeID) return showToast('Vui lòng nhập Mã Số Nhân Viên.');
      if (!payload.Overall) return showToast('Vui lòng chọn Đánh giá tổng quan.');
      if (!payload.ApplyToWork) return showToast('Vui lòng chọn Đồng ý hoặc Không đồng ý.');
      if (!POWER_AUTOMATE_URL.trim()) return showToast('Chưa gắn link Power Automate nên chưa lưu về Excel.');

      submitBtn.disabled = true;
      submitBtn.textContent = 'ĐANG GỬI...';
      try {
        await fetch(POWER_AUTOMATE_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
          body: JSON.stringify(payload)
        });
        showToast('Đã gửi đánh giá. Cảm ơn bạn đã dành thời gian nhé.');
        resetForm();
      } catch (err) {
        console.error(err);
        showToast('Chưa gửi được. Kiểm tra lại link Power Automate.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'NỘP ĐÁNH GIÁ';
      }
    });
  </script>
</body>
</html>
